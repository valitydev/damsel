name: "Publish Proto Library"

on:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  proto-publish:
    name: "Publish Proto Library"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: valitydev/action-setup-thrift@v1
      - uses: valitydev/action-frontend/setup-install@v3
        with:
          release: true
          node-version: "lts/*"
      - name: Build
        run: npm run codegen
      - name: Publish
        uses: valitydev/action-frontend/publish@v3
